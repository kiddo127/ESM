# @package _global_
defaults:
- _self_
- method: ESM

model: ViT-B-32
num_tasks: 8
specify_lambda: None

DATASETS: ''
DATASETS_VAL: ''

# utilities
cache_dir: None
world_size: 1
port: 12355
n_eval_points: 31
device: "cuda"
batch_size: 32
# Set paths below — change to your own dataset and model directories
data_location: "~/data"                              # path to downloaded datasets
model_location: "~/model-merging-models/checkpoints" # path to finetuned checkpoints
save_subfolder: ""
pca_batch_size: 32
seed: 1

# MoE / model saving
save_main_model: False
main_model_path: ""
lora_rank: 32
oracle_routing: False
results_save_path: ""
proxy_n_samples: 32

wandb:
  project: task-vectors
  mode: online
  group: ${model}

hydra:
  run:
    dir: ./logs/${model}/${method.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ./logs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
